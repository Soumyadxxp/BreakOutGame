<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Breakout · Premium</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper {
            background: radial-gradient(ellipse at 50% 0%, #1a1f33 0%, #0b0e1a 70%);
            border-radius: 32px;
            padding: 24px 28px 28px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.04);
            max-width: 820px;
            width: 96%;
            position: relative;
            transition: all 0.2s;
        }
        .game-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), transparent 50%, rgba(0, 200, 255, 0.10));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .header {
            display: none;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 4px;
        }
        .header.visible {
            display: flex;
        }
        .game-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f7d94e, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(247, 217, 78, 0.20);
        }
        .stats {
            display: flex;
            gap: 18px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.75);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 16px 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
        }
        .stats span {
            color: #fff;
            font-weight: 700;
        }
        .stats .score-val {
            color: #f7d94e;
        }
        .stats .lives-val {
            color: #ff6b6b;
        }
        .stats .level-val {
            color: #6bcbff;
        }
        .canvas-wrap {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            background: #111624;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 760 / 480;
            background: transparent;
            touch-action: none;
            cursor: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 14, 26, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.4s ease;
            gap: 10px;
            padding: 20px;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .overlay h2 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-bottom: 2px;
        }
        .overlay .sub {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 300px;
        }
        .overlay .score-big {
            font-size: 26px;
            font-weight: 700;
            color: #f7d94e;
            text-shadow: 0 0 20px rgba(247, 217, 78, 0.25);
            margin-top: -4px;
        }
        .overlay .sub strong {
            color: #f7d94e;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 4px;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            min-width: 120px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f7d94e, #e8a800);
            color: #0b0e1a;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(247, 217, 78, 0.25);
        }
        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 30px rgba(247, 217, 78, 0.35);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .btn-level {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 18px;
            font-size: 14px;
            min-width: auto;
        }
        .btn-level.active {
            background: rgba(247, 217, 78, 0.15);
            border-color: #f7d94e;
            color: #f7d94e;
        }
        .touch-controls {
            display: none;
            justify-content: space-between;
            margin-top: 14px;
            gap: 12px;
        }
        .touch-controls.visible {
            display: flex;
        }
        .touch-btn {
            flex: 1;
            padding: 16px 0;
            border: none;
            border-radius: 60px;
            font-size: 28px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.1s;
            touch-action: none;
            cursor: pointer;
            font-weight: 300;
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.96);
        }
        .touch-btn .label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            display: block;
            opacity: 0.5;
            margin-top: 2px;
        }
        .high-score-pop {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 12px;
            color: rgba(255, 215, 0, 0.5);
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .high-score-pop.visible {
            display: block;
        }
        .high-score-pop span {
            color: #f7d94e;
            font-weight: 700;
        }
        @media (max-width: 600px) {
            .game-wrapper {
                padding: 12px 14px 16px 14px;
                border-radius: 20px;
            }
            .game-title {
                font-size: 17px;
            }
            .stats {
                font-size: 12px;
                padding: 4px 12px 4px 14px;
                gap: 12px;
            }
            .overlay h2 {
                font-size: 24px;
            }
            .btn {
                padding: 10px 22px;
                font-size: 14px;
                min-width: 90px;
            }
            .overlay .score-big {
                font-size: 22px;
            }
        }
        @media (pointer: coarse) {
            .touch-controls.visible {
                display: flex;
            }
        }
        @media (min-width: 601px) {
            .touch-controls.visible {
                display: none !important;
            }
        }
        #gameCanvas {
            image-rendering: auto;
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- header (hidden initially) -->
        <div class="header" id="gameHeader">
            <div class="game-title">⟡ BREAKOUT</div>
            <div class="stats">
                <span>🏆 <span class="score-val" id="scoreDisplay">0</span></span>
                <span>❤️ <span class="lives-val" id="livesDisplay">3</span></span>
                <span>🎯 <span class="level-val" id="levelDisplay">1</span></span>
            </div>
        </div>

        <!-- canvas -->
        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="760" height="480"></canvas>

            <!-- High Score badge (hidden initially) -->
            <div class="high-score-pop" id="highScorePop">👑 BEST <span id="highScoreDisplay">0</span></div>

            <!-- Overlay (always visible on load) -->
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">⟡ BREAKOUT</h2>
                <div class="sub" id="overlaySub">Classic · Premium</div>
                <div class="score-big">Score: <strong id="overlayScoreNum">0</strong></div>
                <div class="btn-group" id="overlayButtons">
                    <button class="btn btn-primary" id="overlayActionBtn">▶&nbsp; START</button>
                    <button class="btn btn-secondary" id="overlayLevelBtn">🎯 Levels</button>
                </div>
                <div class="btn-group" id="levelPicker" style="display:none; gap:6px; flex-wrap:wrap; justify-content:center;">
                    <button class="btn btn-level active" data-level="1">1</button>
                    <button class="btn btn-level" data-level="2">2</button>
                    <button class="btn btn-level" data-level="3">3</button>
                    <button class="btn btn-level" data-level="4">4</button>
                    <button class="btn btn-level" data-level="5">5</button>
                </div>
            </div>
        </div>

        <!-- mobile touch controls (hidden initially) -->
        <div class="touch-controls" id="touchControls">
            <button class="touch-btn" id="touchLeft">◀ <span class="label">LEFT</span></button>
            <button class="touch-btn" id="touchRight">▶ <span class="label">RIGHT</span></button>
        </div>
    </div>

    <script>
        // ============================================================
        //  BREAKOUT · PREMIUM  —  Optimized for smooth 60fps
        // ============================================================

        // ----- canvas setup -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 760,
            H = 480;

        // ----- DOM refs -----
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const overlayScoreNum = document.getElementById('overlayScoreNum');
        const overlayActionBtn = document.getElementById('overlayActionBtn');
        const overlayLevelBtn = document.getElementById('overlayLevelBtn');
        const levelPicker = document.getElementById('levelPicker');
        const levelBtns = levelPicker.querySelectorAll('.btn-level');
        const gameHeader = document.getElementById('gameHeader');
        const touchControls = document.getElementById('touchControls');
        const highScorePop = document.getElementById('highScorePop');

        // ----- audio (Web Audio) -----
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, duration, type = 'sine', vol = 0.12) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (_) { /* silent */ }
        }

        function sfxBounce() { playTone(320, 0.08, 'triangle', 0.10); }

        function sfxBrick() { playTone(520 + Math.random() * 200, 0.10, 'square', 0.07); }

        function sfxLose() { playTone(180, 0.30, 'sawtooth', 0.10); }

        function sfxWin() {
            playTone(523, 0.12, 'sine', 0.10);
            setTimeout(() => playTone(659, 0.12, 'sine', 0.10), 120);
            setTimeout(() => playTone(784, 0.18, 'sine', 0.10), 240);
        }

        function sfxPowerup() { playTone(880, 0.15, 'sine', 0.08);
            setTimeout(() => playTone(1100, 0.15, 'sine', 0.08), 100); }

        // ----- game state -----
        const G = {
            running: false,
            over: false,
            level: 1,
            score: 0,
            lives: 3,
            highScore: parseInt(localStorage.getItem('breakout_high')) || 0,
            combo: 0,
        };
        highScoreDisplay.textContent = G.highScore;

        // cached UI values to avoid unnecessary DOM writes
        const ui = {
            score: -1,
            lives: -1,
            level: -1,
            highScore: -1,
        };

        // ----- entities -----
        let ball = { x: W / 2, y: H - 50, r: 8, dx: 3.2, dy: -3.8, speed: 4.2 };
        let paddle = { x: W / 2 - 60, y: H - 28, w: 120, h: 12, targetX: W / 2 - 60 };
        let bricks = [];
        let particles = [];
        let powerups = [];
        let activeEffects = { wide: 0, multi: 0, slow: 0, fire: 0 };
        let extraBalls = [];
        let frameId = null;
        let loopRunning = false;

        // ----- input -----
        const keys = { left: false, right: false };
        let touchLeft = false,
            touchRight = false;

        // ----- brick patterns -----
        function buildBricks(level) {
            const rows = Math.min(3 + level, 8);
            const cols = Math.min(6 + level, 12);
            const brickW = 56,
                brickH = 20,
                gap = 4;
            const totalW = cols * (brickW + gap) - gap;
            const startX = (W - totalW) / 2;
            const startY = 44;
            const bricks2 = [];
            const colors = [
                '#ff6b6b', '#ff9f43', '#feca57', '#48dbfb', '#0abde3',
                '#a29bfe', '#fd79a8', '#55efc4', '#fdcb6e', '#e17055'
            ];
            for (let r = 0; r < rows; r++) {
                const row = [];
                let count = cols;
                let offsetX = 0;
                if (level >= 3 && r === Math.floor(rows / 2)) { count = Math.max(2, cols - 4);
                    offsetX = (cols - count) * (brickW + gap) / 2; }
                if (level >= 4 && r % 2 === 1) { count = Math.max(2, cols - 2);
                    offsetX = (cols - count) * (brickW + gap) / 2; }
                if (level >= 5 && r > 0 && r < rows - 1 && r % 2 === 0) { count = Math.max(2, cols - 6);
                    offsetX = (cols - count) * (brickW + gap) / 2; }
                const hp = (level >= 4 && r >= rows - 2) ? 2 : 1;
                const colorIdx = r % colors.length;
                for (let c = 0; c < count; c++) {
                    row.push({
                        x: startX + offsetX + c * (brickW + gap),
                        y: startY + r * (brickH + gap),
                        w: brickW,
                        h: brickH,
                        hp: hp,
                        maxHp: hp,
                        color: colors[colorIdx],
                        alive: true,
                    });
                }
                bricks2.push(row);
            }
            return bricks2;
        }

        // ----- reset game -----
        function resetGame(level) {
            G.level = level || G.level;
            G.score = 0;
            G.lives = 3;
            G.combo = 0;
            G.over = false;
            G.running = true;
            activeEffects = { wide: 0, multi: 0, slow: 0, fire: 0 };
            extraBalls = [];
            powerups = [];
            particles = [];
            const baseSpeed = 4.0 + (G.level - 1) * 0.35;
            ball = {
                x: W / 2,
                y: H - 50,
                r: 8,
                dx: (Math.random() > 0.5 ? 1 : -1) * baseSpeed * 0.7,
                dy: -baseSpeed * 0.8,
                speed: baseSpeed
            };
            paddle.x = W / 2 - 60;
            paddle.targetX = paddle.x;
            paddle.w = 120;
            bricks = buildBricks(G.level);
            // force UI update
            ui.score = -1;
            ui.lives = -1;
            ui.level = -1;
            updateUI();
            hideOverlay();
            sfxWin();
        }

        // ----- UI update (only when values change) -----
        function updateUI() {
            // Score
            if (ui.score !== G.score) {
                ui.score = G.score;
                scoreDisplay.textContent = G.score;
                overlayScoreNum.textContent = G.score;
            }
            // Lives
            if (ui.lives !== G.lives) {
                ui.lives = G.lives;
                livesDisplay.textContent = G.lives;
            }
            // Level
            if (ui.level !== G.level) {
                ui.level = G.level;
                levelDisplay.textContent = G.level;
            }
            // High score
            if (G.score > G.highScore) {
                G.highScore = G.score;
                localStorage.setItem('breakout_high', String(G.highScore));
                if (ui.highScore !== G.highScore) {
                    ui.highScore = G.highScore;
                    highScoreDisplay.textContent = G.highScore;
                }
            }
        }

        // ----- overlay helpers -----
        function showOverlay(title, sub, actionLabel, showLevels = false) {
            overlay.classList.remove('hidden');
            overlayTitle.textContent = title;
            overlaySub.innerHTML = sub || '';
            overlayActionBtn.textContent = actionLabel || '▶ START';
            levelPicker.style.display = showLevels ? 'flex' : 'none';
            overlayLevelBtn.style.display = showLevels ? 'none' : 'inline-block';
            levelBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.level) === G.level));
            // ensure score is fresh
            overlayScoreNum.textContent = G.score;
        }

        function hideOverlay() {
            overlay.classList.add('hidden');
            levelPicker.style.display = 'none';
            overlayLevelBtn.style.display = 'inline-block';
        }

        // ----- particles (capped at 200) -----
        function spawnParticles(x, y, color, count = 18) {
            const maxP = 200;
            for (let i = 0; i < count && particles.length < maxP; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.5,
                    life: 1,
                    decay: 0.012 + Math.random() * 0.020,
                    r: 2 + Math.random() * 4,
                    color: color,
                });
            }
        }

        function spawnPowerup(x, y) {
            if (Math.random() > 0.22) return;
            const types = ['wide', 'multi', 'slow', 'life', 'fire'];
            const type = types[Math.floor(Math.random() * types.length)];
            powerups.push({
                x,
                y,
                type,
                w: 22,
                h: 22,
                dy: 1.8,
                alive: true,
                life: 600,
            });
        }

        // ----- collision helpers -----
        function rectCircleCollide(rx, ry, rw, rh, cx, cy, cr) {
            const nearX = Math.max(rx, Math.min(cx, rx + rw));
            const nearY = Math.max(ry, Math.min(cy, ry + rh));
            const dx = cx - nearX,
                dy = cy - nearY;
            return (dx * dx + dy * dy) < (cr * cr);
        }

        // ----- game logic update -----
        function update() {
            if (!G.running || G.over) return;

            const pSpeed = 7.2;
            if (keys.left || touchLeft) paddle.targetX = Math.max(0, paddle.targetX - pSpeed);
            if (keys.right || touchRight) paddle.targetX = Math.min(W - paddle.w, paddle.targetX + pSpeed);
            paddle.x += (paddle.targetX - paddle.x) * 0.28;
            paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

            if (activeEffects.wide > 0) { activeEffects.wide--;
                paddle.w = 180; } else { paddle.w += (120 - paddle.w) * 0.04; }
            if (activeEffects.multi > 0) activeEffects.multi--;
            if (activeEffects.slow > 0) activeEffects.slow--;
            if (activeEffects.fire > 0) activeEffects.fire--;

            const allBalls = [ball, ...extraBalls];
            const speedMul = activeEffects.slow > 0 ? 0.55 : 1;

            for (let bi = allBalls.length - 1; bi >= 0; bi--) {
                const b = allBalls[bi];
                if (!b) continue;

                b.x += b.dx * speedMul;
                b.y += b.dy * speedMul;

                if (b.x - b.r < 0) { b.x = b.r;
                    b.dx = Math.abs(b.dx);
                    sfxBounce(); }
                if (b.x + b.r > W) { b.x = W - b.r;
                    b.dx = -Math.abs(b.dx);
                    sfxBounce(); }
                if (b.y - b.r < 0) { b.y = b.r;
                    b.dy = Math.abs(b.dy);
                    sfxBounce(); }

                if (b.dy > 0 &&
                    b.y + b.r >= paddle.y &&
                    b.y + b.r <= paddle.y + paddle.h + 6 &&
                    b.x >= paddle.x - b.r &&
                    b.x <= paddle.x + paddle.w + b.r) {
                    const hitPos = (b.x - paddle.x) / paddle.w;
                    const angle = (hitPos - 0.5) * 1.2;
                    const spd = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                    b.dx = Math.sin(angle) * spd * 1.05;
                    b.dy = -Math.cos(angle) * spd * 1.05;
                    b.y = paddle.y - b.r;
                    const minSpd = 2.0,
                        maxSpd = 7.5;
                    const curSpd = Math.sqrt(b.dx * b.dx + b.dy * b.dy);
                    if (curSpd < minSpd) { const r = minSpd / curSpd;
                        b.dx *= r;
                        b.dy *= r; }
                    if (curSpd > maxSpd) { const r = maxSpd / curSpd;
                        b.dx *= r;
                        b.dy *= r; }
                    sfxBounce();
                    G.combo = 0;
                }

                if (b.y + b.r > H) {
                    if (bi === 0) {
                        G.lives--;
                        updateUI();
                        sfxLose();
                        if (G.lives <= 0) {
                            gameOver(false);
                            return;
                        }
                        const baseSpeed = 4.0 + (G.level - 1) * 0.35;
                        ball.x = W / 2;
                        ball.y = H - 50;
                        ball.dx = (Math.random() > 0.5 ? 1 : -1) * baseSpeed * 0.7;
                        ball.dy = -baseSpeed * 0.8;
                        ball.speed = baseSpeed;
                        extraBalls = [];
                        powerups = [];
                        activeEffects = { wide: 0, multi: 0, slow: 0, fire: 0 };
                        paddle.w = 120;
                    } else {
                        extraBalls.splice(bi - 1, 1);
                    }
                    continue;
                }

                for (let row of bricks) {
                    for (let brick of row) {
                        if (!brick.alive) continue;
                        if (rectCircleCollide(brick.x, brick.y, brick.w, brick.h, b.x, b.y, b.r)) {
                            const overlapX = (b.x < brick.x + brick.w / 2) ?
                                (b.x + b.r - brick.x) :
                                (brick.x + brick.w - (b.x - b.r));
                            const overlapY = (b.y < brick.y + brick.h / 2) ?
                                (b.y + b.r - brick.y) :
                                (brick.y + brick.h - (b.y - b.r));
                            if (overlapX < overlapY) {
                                b.dx = -b.dx;
                            } else {
                                b.dy = -b.dy;
                            }
                            if (activeEffects.fire > 0) {
                                brick.hp = 0;
                            } else {
                                brick.hp--;
                            }
                            if (brick.hp <= 0) {
                                brick.alive = false;
                                G.combo++;
                                const bonus = Math.min(G.combo, 10);
                                const pts = 10 + bonus * 2;
                                G.score += pts;
                                spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color, 14);
                                sfxBrick();
                                spawnPowerup(brick.x + brick.w / 2, brick.y + brick.h / 2);
                                updateUI();
                            } else {
                                spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, '#ffffff', 6);
                                sfxBounce();
                            }
                            break;
                        }
                    }
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.y += p.dy;
                p.life--;
                if (p.y > H + 30 || p.life <= 0) { powerups.splice(i, 1); continue; }
                if (p.y + p.h >= paddle.y && p.y <= paddle.y + paddle.h &&
                    p.x + p.w >= paddle.x && p.x <= paddle.x + paddle.w) {
                    applyPowerup(p.type);
                    spawnParticles(p.x + p.w / 2, p.y + p.h / 2, '#f7d94e', 25);
                    sfxPowerup();
                    powerups.splice(i, 1);
                }
            }

            let alive = 0;
            for (let row of bricks)
                for (let b of row)
                    if (b.alive) alive++;
            if (alive === 0) {
                levelComplete();
                return;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
            // cap particles
            if (particles.length > 250) particles.splice(0, particles.length - 250);
            updateUI();
        }

        // ----- apply powerup -----
        function applyPowerup(type) {
            switch (type) {
                case 'wide':
                    activeEffects.wide = 480;
                    break;
                case 'multi':
                    activeEffects.multi = 420;
                    for (let i = 0; i < 2; i++) {
                        const angle = (i === 0 ? -0.4 : 0.4);
                        const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) || 4;
                        extraBalls.push({
                            x: ball.x + (i === 0 ? -20 : 20),
                            y: ball.y - 10,
                            r: 7,
                            dx: Math.sin(angle) * spd * 0.9,
                            dy: -Math.cos(angle) * spd * 0.9,
                        });
                    }
                    break;
                case 'slow':
                    activeEffects.slow = 300;
                    break;
                case 'life':
                    G.lives = Math.min(G.lives + 1, 5);
                    updateUI();
                    break;
                case 'fire':
                    activeEffects.fire = 360;
                    break;
            }
        }

        // ----- level complete -----
        function levelComplete() {
            G.running = false;
            sfxWin();
            const next = G.level + 1;
            if (next > 5) {
                showOverlay(
                    '🏆 YOU WIN!',
                    `Final Score: <strong>${G.score}</strong> · All 5 levels cleared!`,
                    '🔄 Play Again',
                    false
                );
                overlayActionBtn.onclick = () => { G.level = 1;
                    startGame(); };
                G.over = true;
                return;
            }
            showOverlay(
                `✨ Level ${G.level} Complete!`,
                `Score: <strong>${G.score}</strong> · Next: Level ${next}`,
                `▶ Level ${next}`,
                false
            );
            overlayActionBtn.onclick = () => {
                G.level = next;
                startGame();
            };
            G.over = true;
        }

        // ----- game over -----
        function gameOver(won = false) {
            G.running = false;
            G.over = true;
            if (G.score > G.highScore) {
                G.highScore = G.score;
                localStorage.setItem('breakout_high', String(G.highScore));
                highScoreDisplay.textContent = G.highScore;
            }
            updateUI();
            const title = won ? '🎉 You Win!' : '💔 Game Over';
            const sub = won ?
                `Final Score: <strong>${G.score}</strong>` :
                `Score: <strong>${G.score}</strong> · Best: <strong>${G.highScore}</strong>`;
            showOverlay(title, sub, '🔄 Restart', false);
            overlayActionBtn.onclick = () => { startGame(); };
        }

        // ----- rendering -----
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // subtle grid
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y < H; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // bricks
            for (let row of bricks) {
                for (let brick of row) {
                    if (!brick.alive) continue;
                    const hpRatio = brick.hp / brick.maxHp;
                    const alpha = 0.6 + 0.4 * hpRatio;
                    ctx.shadowColor = brick.color;
                    ctx.shadowBlur = 8;
                    ctx.fillStyle = brick.color;
                    ctx.globalAlpha = alpha;
                    const r = 4;
                    const x = brick.x,
                        y = brick.y,
                        w = brick.w,
                        h = brick.h;
                    ctx.beginPath();
                    ctx.moveTo(x + r, y);
                    ctx.lineTo(x + w - r, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                    ctx.lineTo(x + w, y + h - r);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    ctx.lineTo(x + r, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                    ctx.lineTo(x, y + r);
                    ctx.quadraticCurveTo(x, y, x + r, y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 0.15;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x + 4, y + 3, w - 8, 4);
                    ctx.globalAlpha = 1;
                    if (brick.maxHp > 1) {
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(x + 4, y + h - 4, (w - 8) * hpRatio, 3);
                    }
                }
            }
            ctx.shadowBlur = 0;

            // powerups
            for (let p of powerups) {
                const colors = {
                    wide: '#6bcbff',
                    multi: '#ff6b6b',
                    slow: '#55efc4',
                    life: '#ff6bb5',
                    fire: '#ff9f43'
                };
                const c = colors[p.type] || '#fff';
                ctx.shadowColor = c;
                ctx.shadowBlur = 20;
                ctx.fillStyle = c;
                ctx.beginPath();
                ctx.arc(p.x + p.w / 2, p.y + p.h / 2, 11, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#0b0e1a';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const icons = { wide: '⇔', multi: '✦', slow: '◐', life: '♥', fire: '🔥' };
                ctx.fillText(icons[p.type] || '?', p.x + p.w / 2, p.y + p.h / 2 + 1);
                ctx.fillStyle = '#fff';
                ctx.font = '10px sans-serif';
                ctx.fillText(p.type.toUpperCase(), p.x + p.w / 2, p.y + p.h + 16);
            }
            ctx.shadowBlur = 0;

            // paddle
            const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
            const isWide = activeEffects.wide > 0;
            const isFire = activeEffects.fire > 0;
            const col1 = isFire ? '#ff6b35' : (isWide ? '#48dbfb' : '#6bcbff');
            const col2 = isFire ? '#ff3d00' : (isWide ? '#0abde3' : '#3d9eff');
            grad.addColorStop(0, col1);
            grad.addColorStop(1, col2);
            ctx.shadowColor = isFire ? '#ff6b35' : '#6bcbff';
            ctx.shadowBlur = isFire ? 30 : 16;
            ctx.fillStyle = grad;
            const r2 = 6;
            const px = paddle.x,
                py = paddle.y,
                pw = paddle.w,
                ph = paddle.h;
            ctx.beginPath();
            ctx.moveTo(px + r2, py);
            ctx.lineTo(px + pw - r2, py);
            ctx.quadraticCurveTo(px + pw, py, px + pw, py + r2);
            ctx.lineTo(px + pw, py + ph - r2);
            ctx.quadraticCurveTo(px + pw, py + ph, px + pw - r2, py + ph);
            ctx.lineTo(px + r2, py + ph);
            ctx.quadraticCurveTo(px, py + ph, px, py + ph - r2);
            ctx.lineTo(px, py + r2);
            ctx.quadraticCurveTo(px, py, px + r2, py);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#fff';
            ctx.fillRect(px + 12, py + 3, pw - 24, 3);
            ctx.globalAlpha = 1;

            // balls
            const allBalls = [ball, ...extraBalls];
            for (let b of allBalls) {
                const isFireBall = activeEffects.fire > 0 && b === ball;
                ctx.shadowColor = isFireBall ? '#ff6b35' : '#f7d94e';
                ctx.shadowBlur = isFireBall ? 35 : 18;
                const grad2 = ctx.createRadialGradient(b.x - 2, b.y - 3, 1, b.x, b.y, b.r + 2);
                grad2.addColorStop(0, isFireBall ? '#ff9f43' : '#fffbe6');
                grad2.addColorStop(0.5, isFireBall ? '#ff6b35' : '#f7d94e');
                grad2.addColorStop(1, isFireBall ? '#e83000' : '#d4a800');
                ctx.fillStyle = grad2;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(b.x - 2.5, b.y - 3.5, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            ctx.shadowBlur = 0;

            // particles
            for (let p of particles) {
                ctx.globalAlpha = p.life * 0.9;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // combo
            if (G.combo >= 3 && G.running) {
                ctx.fillStyle = `rgba(247,217,78,${0.5 + 0.3 * Math.sin(Date.now() / 200)})`;
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`🔥 ${G.combo}x COMBO`, 16, 14);
            }
        }

        // ----- game loop (single, non‑blocking) -----
        function loop() {
            if (!loopRunning) return;
            update();
            draw();
            frameId = requestAnimationFrame(loop);
        }

        // ----- start / stop loop safely -----
        function startLoop() {
            if (loopRunning) return;
            loopRunning = true;
            if (frameId) cancelAnimationFrame(frameId);
            loop();
        }

        function stopLoop() {
            loopRunning = false;
            if (frameId) {
                cancelAnimationFrame(frameId);
                frameId = null;
            }
        }

        // ----- start game (shows hidden UI) -----
        function startGame() {
            // Show header, touch controls, and high-score pop
            gameHeader.classList.add('visible');
            touchControls.classList.add('visible');
            highScorePop.classList.add('visible');

            // reset state
            resetGame(G.level);
            hideOverlay();
            // ensure loop is running
            if (!loopRunning) startLoop();
        }

        // ----- event binding -----
        function bindEvents() {
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft' || e.key === 'Left' || e.key === 'a' || e.key === 'A') {
                    keys.left = true;
                    e.preventDefault();
                }
                if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === 'd' || e.key === 'D') {
                    keys.right = true;
                    e.preventDefault();
                }
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    if (!G.running && !G.over) startGame();
                }
            });
            document.addEventListener('keyup', e => {
                if (e.key === 'ArrowLeft' || e.key === 'Left' || e.key === 'a' || e.key === 'A') { keys.left = false;
                    e.preventDefault(); }
                if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === 'd' || e.key === 'D') { keys.right = false;
                    e.preventDefault(); }
            });

            const tLeft = document.getElementById('touchLeft');
            const tRight = document.getElementById('touchRight');
            const touchStart = (side) => (e) => { e.preventDefault();
                initAudio();
                if (side === 'left') touchLeft = true;
                else touchRight = true; };
            const touchEnd = (side) => (e) => { e.preventDefault(); if (side === 'left') touchLeft = false;
                else touchRight = false; };
            tLeft.addEventListener('touchstart', touchStart('left'), { passive: false });
            tLeft.addEventListener('touchend', touchEnd('left'), { passive: false });
            tLeft.addEventListener('touchcancel', touchEnd('left'), { passive: false });
            tRight.addEventListener('touchstart', touchStart('right'), { passive: false });
            tRight.addEventListener('touchend', touchEnd('right'), { passive: false });
            tRight.addEventListener('touchcancel', touchEnd('right'), { passive: false });
            tLeft.addEventListener('mousedown', () => { initAudio();
                touchLeft = true; });
            tLeft.addEventListener('mouseup', () => { touchLeft = false; });
            tLeft.addEventListener('mouseleave', () => { touchLeft = false; });
            tRight.addEventListener('mousedown', () => { initAudio();
                touchRight = true; });
            tRight.addEventListener('mouseup', () => { touchRight = false; });
            tRight.addEventListener('mouseleave', () => { touchRight = false; });

            canvas.addEventListener('mousemove', (e) => {
                if (!G.running) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const mouseX = (e.clientX - rect.left) * scaleX;
                paddle.targetX = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));
            });

            overlayActionBtn.addEventListener('click', () => {
                initAudio();
                const txt = overlayActionBtn.textContent.trim();
                if (txt.includes('START') || txt.includes('Restart') || txt.includes('Play') || txt.includes('Level')) {
                    startGame();
                }
            });

            overlayLevelBtn.addEventListener('click', () => {
                levelPicker.style.display = levelPicker.style.display === 'flex' ? 'none' : 'flex';
            });

            levelBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const lv = parseInt(btn.dataset.level);
                    G.level = lv;
                    levelBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.level) === lv));
                    levelPicker.style.display = 'none';
                    overlaySub.innerHTML = `Classic · Premium · Level ${lv}`;
                    startGame();
                });
            });

            window.addEventListener('resize', () => { /* canvas scales via CSS */ });
        }

        // ----- init -----
        function init() {
            G.highScore = parseInt(localStorage.getItem('breakout_high')) || 0;
            highScoreDisplay.textContent = G.highScore;
            G.level = 1;
            bricks = buildBricks(1);
            resetGame(1);
            // ensure overlay is visible, UI hidden
            overlay.classList.remove('hidden');
            gameHeader.classList.remove('visible');
            touchControls.classList.remove('visible');
            highScorePop.classList.remove('visible');
            showOverlay('⟡ BREAKOUT', 'Classic · Premium', '▶ START', false);
            overlayActionBtn.onclick = () => { initAudio();
                startGame(); };
            bindEvents();
            draw();
            // start the loop only once
            if (!loopRunning) startLoop();
        }

        // ----- kickoff -----
        init();
    </script>
